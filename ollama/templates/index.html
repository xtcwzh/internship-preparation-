<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算法题解析助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 16px 24px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #e94560;
        }

        header .subtitle {
            font-size: 13px;
            color: #888;
        }

        #clear-btn {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        #clear-btn:hover {
            border-color: #e94560;
            color: #e94560;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.7;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: #222244;
            border-bottom-left-radius: 4px;
        }

        .message.ai pre {
            background: #0d1117;
            border-radius: 8px;
            padding: 14px;
            margin: 10px 0;
            overflow-x: auto;
        }

        .message.ai code {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 13.5px;
        }

        .message.ai p code {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13.5px;
        }

        .message.ai h1, .message.ai h2, .message.ai h3 {
            margin: 12px 0 6px;
            color: #e94560;
        }

        .message.ai ul, .message.ai ol {
            padding-left: 20px;
            margin: 6px 0;
        }

        .message.ai strong {
            color: #fff;
        }

        #welcome {
            text-align: center;
            margin: auto;
            color: #666;
        }

        #welcome h2 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #e94560;
        }

        #welcome p {
            font-size: 15px;
            margin: 4px 0;
        }

        #welcome .examples {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .example-btn {
            background: #222244;
            border: 1px solid #333;
            color: #ccc;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            max-width: 500px;
            width: 100%;
            text-align: left;
        }

        .example-btn:hover {
            border-color: #e94560;
            color: #fff;
        }

        #input-area {
            background: #16213e;
            padding: 16px 24px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            resize: none;
            font-family: inherit;
            min-height: 48px;
            max-height: 150px;
        }

        #user-input:focus {
            outline: none;
            border-color: #e94560;
        }

        #send-btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }

        #send-btn:hover { background: #c73652; }
        #send-btn:disabled { background: #555; cursor: not-allowed; }

        .typing-cursor::after {
            content: "▊";
            animation: blink 0.7s infinite;
            color: #e94560;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>算法题解析助手</h1>
            <div class="subtitle">基于 Ollama + LangChain | 本地大模型驱动</div>
        </div>
        <button id="clear-btn" onclick="clearChat()">清空对话</button>
    </header>

    <div id="chat-container">
        <div id="welcome">
            <h2>算法题解析助手</h2>
            <p>我可以帮你分析算法题、讲解思路、写代码、找 Bug</p>
            <p>试试下面的例子，或者直接输入你的问题：</p>
            <div class="examples">
                <button class="example-btn" onclick="sendExample(this)">两数之和怎么用哈希表解？时间复杂度是多少？</button>
                <button class="example-btn" onclick="sendExample(this)">帮我分析一下快速排序的最坏情况，为什么是 O(n²)？</button>
                <button class="example-btn" onclick="sendExample(this)">用动态规划解最长公共子序列（LCS）问题，给出代码</button>
            </div>
        </div>
    </div>

    <div id="input-area">
        <textarea id="user-input" placeholder="输入你的算法问题..." rows="1"
                  onkeydown="handleKeyDown(event)"></textarea>
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
        });

        let sessionId = null;
        let isStreaming = false;

        function handleKeyDown(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendExample(btn) {
            document.getElementById("user-input").value = btn.textContent;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const msg = input.value.trim();
            if (!msg || isStreaming) return;

            const welcome = document.getElementById("welcome");
            if (welcome) welcome.remove();

            appendMessage("user", msg);
            input.value = "";
            autoResize(input);

            isStreaming = true;
            document.getElementById("send-btn").disabled = true;

            const aiDiv = appendMessage("ai", "");
            aiDiv.classList.add("typing-cursor");

            try {
                const resp = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg, session_id: sessionId }),
                });

                if (!sessionId) {
                    sessionId = resp.headers.get("X-Session-Id");
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let rawText = "";
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const data = line.slice(6);
                            if (data === "[DONE]") continue;
                            rawText += data;
                            aiDiv.innerHTML = marked.parse(rawText);
                        }
                    }
                    scrollToBottom();
                }

                aiDiv.innerHTML = marked.parse(rawText);
                aiDiv.querySelectorAll("pre code").forEach(block => {
                    hljs.highlightElement(block);
                });
            } catch (err) {
                aiDiv.innerHTML = `<p style="color:#e94560">请求出错: ${err.message}</p>`;
            } finally {
                aiDiv.classList.remove("typing-cursor");
                isStreaming = false;
                document.getElementById("send-btn").disabled = false;
                scrollToBottom();
            }
        }

        function appendMessage(role, content) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${role}`;
            if (role === "user") {
                div.textContent = content;
            } else {
                div.innerHTML = content ? marked.parse(content) : "";
            }
            container.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            const c = document.getElementById("chat-container");
            c.scrollTop = c.scrollHeight;
        }

        async function clearChat() {
            if (sessionId) {
                await fetch("/clear", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId }),
                });
            }
            sessionId = null;
            const container = document.getElementById("chat-container");
            container.innerHTML = `
                <div id="welcome">
                    <h2>算法题解析助手</h2>
                    <p>我可以帮你分析算法题、讲解思路、写代码、找 Bug</p>
                    <p>试试下面的例子，或者直接输入你的问题：</p>
                    <div class="examples">
                        <button class="example-btn" onclick="sendExample(this)">两数之和怎么用哈希表解？时间复杂度是多少？</button>
                        <button class="example-btn" onclick="sendExample(this)">帮我分析一下快速排序的最坏情况，为什么是 O(n²)？</button>
                        <button class="example-btn" onclick="sendExample(this)">用动态规划解最长公共子序列（LCS）问题，给出代码</button>
                    </div>
                </div>`;
        }

        const textarea = document.getElementById("user-input");
        textarea.addEventListener("input", () => autoResize(textarea));

        function autoResize(el) {
            el.style.height = "auto";
            el.style.height = Math.min(el.scrollHeight, 150) + "px";
        }
    </script>
</body>
</html>
